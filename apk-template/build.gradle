plugins {
    id 'com.android.application' version '8.2.0'
}

android {
    namespace 'com.wanderlogpro.viewer'
    compileSdk 34

    defaultConfig {
        applicationId "com.wanderlogpro.viewer"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {}
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
